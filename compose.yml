services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nutriflow
      POSTGRES_USER: nutriflow
      POSTGRES_PASSWORD: nutriflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriflow -d nutriflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:4
    environment:
      SERVICES: sqs,lambda
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  postgres-data:
  mongo-data:
  localstack-data:

