services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutriflow
      POSTGRES_USER: nutriflow
      POSTGRES_PASSWORD: nutriflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriflow -d nutriflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:4.0.3
    restart: unless-stopped
    environment:
      SERVICES: sqs,lambda
      AWS_DEFAULT_REGION: us-east-1
      LAMBDA_DOCKER_NETWORK: nutriflow
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/init-queues.sh:/etc/localstack/init/ready.d/init-queues.sh:ro
      - ./infra/localstack/deploy-worker.sh:/opt/nutriflow/deploy-worker.sh:ro
      - ./worker/target:/opt/nutriflow/worker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs get-queue-url --queue-name meal-plan-events"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  mongo-data:
  localstack-data:

networks:
  default:
    name: nutriflow
