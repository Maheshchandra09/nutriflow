apiVersion: v1
kind: ConfigMap
metadata:
  name: nutriflow-api
data:
  POSTGRES_URL: jdbc:postgresql://postgres:5432/nutriflow
  MONGODB_URI: mongodb://mongodb:27017/nutriflow
  AWS_REGION: us-east-1
  SQS_ENABLED: "true"
  SQS_QUEUE_URL: http://localstack:4566/000000000000/meal-plan-events
  AWS_ENDPOINT_URL: http://localstack:4566
  SQS_DISPATCH_DELAY_MS: "1000"
