spring:
  application:
    name: nutriflow-api
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/nutriflow}
    username: ${POSTGRES_USER:nutriflow}
    password: ${POSTGRES_PASSWORD:nutriflow}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/nutriflow}
      auto-index-creation: true
  graphql:
    graphiql:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

nutriflow:
  messaging:
    sqs:
      enabled: ${SQS_ENABLED:false}
      queue-url: ${SQS_QUEUE_URL:}
      region: ${AWS_REGION:us-east-1}
      endpoint: ${AWS_ENDPOINT_URL:}
      dispatch-delay-ms: ${SQS_DISPATCH_DELAY_MS:1000}
